name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm

          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,rpm

          - name: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg

          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            bundles: dmg

          - name: windows-x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: nsis

          - name: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fontconfig libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install icon font on Linux and macOS
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          font_url="https://github.com/google/fonts/raw/main/ofl/notosansmath/NotoSansMath-Regular.ttf"

          if [ "${RUNNER_OS}" = "Linux" ]; then
            font_dir="${HOME}/.local/share/fonts"
            mkdir -p "${font_dir}"
            curl -fL "${font_url}" -o "${font_dir}/NotoSansMath-Regular.ttf"
            fc-cache -f "${font_dir}"
            fc-match "Noto Sans Math"
          else
            font_dir="${HOME}/Library/Fonts"
            mkdir -p "${font_dir}"
            curl -fL "${font_url}" -o "${font_dir}/NotoSansMath-Regular.ttf"
          fi

      - name: Install icon font on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $fontUrl = "https://github.com/google/fonts/raw/main/ofl/notosansmath/NotoSansMath-Regular.ttf"
          $fontDir = Join-Path $env:LOCALAPPDATA "Microsoft\Windows\Fonts"
          New-Item -ItemType Directory -Force -Path $fontDir | Out-Null
          $fontPath = Join-Path $fontDir "NotoSansMath-Regular.ttf"
          Invoke-WebRequest -Uri $fontUrl -OutFile $fontPath

          try {
            $systemFontPath = Join-Path $env:WINDIR "Fonts\NotoSansMath-Regular.ttf"
            Copy-Item -Path $fontPath -Destination $systemFontPath -Force
            New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Fonts" -Name "Noto Sans Math (TrueType)" -Value "NotoSansMath-Regular.ttf" -PropertyType String -Force | Out-Null
          } catch {
            New-ItemProperty -Path "HKCU:\Software\Microsoft\Windows NT\CurrentVersion\Fonts" -Name "Noto Sans Math (TrueType)" -Value $fontPath -PropertyType String -Force | Out-Null
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload bundles
        uses: actions/upload-artifact@v7.0.1
        with:
          name: vaultforge-wallet-${{ matrix.name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Read package version
        id: version
        run: |
          version="$(python3 - <<'PY'
          import json
          from pathlib import Path

          print(json.loads(Path("package.json").read_text())["version"])
          PY
          )"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Download bundles
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          python3 - <<'PY'
          import shutil
          from pathlib import Path

          dist = Path("release-assets")
          dist.mkdir(exist_ok=True)

          release_extensions = {".deb", ".rpm", ".dmg", ".exe"}
          for source in Path("artifacts").rglob("*"):
              if not source.is_file() or source.suffix.lower() not in release_extensions:
                  continue

              target = dist / source.name
              if target.exists():
                  target = dist / f"{source.parent.name}-{source.name}"
              shutil.copy2(source, target)

          if not any(dist.iterdir()):
              raise SystemExit("no release assets collected")
          PY

      - name: Generate release banner
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fontconfig librsvg2-bin

          font_url="https://github.com/google/fonts/raw/main/ofl/notosansmath/NotoSansMath-Regular.ttf"
          font_dir="${HOME}/.local/share/fonts"
          mkdir -p "${font_dir}"
          curl -fL "${font_url}" -o "${font_dir}/NotoSansMath-Regular.ttf"
          fc-cache -f "${font_dir}"

          rsvg-convert \
            --width 3072 \
            --height 1024 \
            --output src-tauri/icons/banner.png \
            src-tauri/icons/banner.svg
          cp src-tauri/icons/banner.png release-assets/vaultforge-banner.png

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          previous_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)"

          {
            printf 'Release %s\n\n' "${RELEASE_TAG}"

            if [ -n "${previous_tag}" ]; then
              printf 'Changes since %s:\n\n' "${previous_tag}"
              range="${previous_tag}..HEAD"
            else
              printf 'Changes in this release:\n\n'
              range="HEAD"
            fi

            git log --format='- %h %s' "${range}"
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.tag }}" release-assets/* \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md
